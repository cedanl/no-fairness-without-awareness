on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

name: scoop-installer-test

permissions: read-all

jobs:
  scoop-test:
    runs-on: windows-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install package from source (simulates scoop install)
        run: |
          install.packages("remotes", repos = "https://cloud.r-project.org")
          remotes::install_local(".", dependencies = TRUE, upgrade = "never")
        shell: Rscript {0}

      - name: Verify package loads and key functions exist
        run: |
          library(nfwa)

          fns <- c("analyze_fairness", "nfwa_storage", "run_nfwa",
                   "transform_data", "render_report", "read_metadata",
                   "cleanup_temp", "run_app")
          for (fn in fns) {
            if (!exists(fn, envir = asNamespace("nfwa"))) stop(fn, " not exported")
          }
          message("All exported functions verified")

          storage <- nfwa_storage()
          stopifnot("Default backend is not file" = storage$type == "file")
          message("Storage backend OK")
        shell: Rscript {0}

      - name: Validate scoop manifest JSON
        run: |
          $manifest = Get-Content scoop/nfwa.json | ConvertFrom-Json
          if (-not $manifest.version) { throw "Missing version" }
          if (-not $manifest.description) { throw "Missing description" }
          if (-not $manifest.url) { throw "Missing url" }
          Write-Host "Scoop manifest valid: $($manifest.description) v$($manifest.version)"
        shell: pwsh
